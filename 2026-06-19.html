<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="squares">
				<div class="square left"></div>
				<div class="square right"></div>
			</div>
		</div>
	</body>
	<style>
		* {
			margin: 0;
		}
		.container {
			display: flex;
			width: 100%;
			height: 100vh;
			justify-content: center;
			align-items: center;
			background: #af6a8a;
		}
		.squares {
			display: flex;
			justify-content: center;
			align-items: center;
		}
		.square {
			position: relative;
			width: 120px;
			aspect-ratio: 1 / 1;
			background-color: #ffffff;
			transform: rotate(45deg);
			transform-origin: center center;
		}
		.square::before {
			content: '';
			position: absolute;
			width: 60px;
			aspect-ratio: 1 / 1;
			background-color: #444444;
			top: 50%;
		}
		.square.left {
			left: 17.5px;
		}
		.square.left::before {
			left: -30px;
			transform: translate(30px, 0px);
		}
		.square.right {
			right: 17.5px;
		}
		.square.right::before {
			right: -30px;
			transform: translate(-30px, -60px);
		}
	</style>
</html>
