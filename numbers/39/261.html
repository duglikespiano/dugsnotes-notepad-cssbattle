<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="bar">
				<div class="sign top"></div>
				<div class="sign bottom"></div>
			</div>
		</div>
	</body>
	<style>
		* {
			margin: 0;
		}
		.container {
			display: flex;
			width: 100%;
			height: 100vh;
			align-items: center;
			justify-content: center;
			background: #2d3464;
		}
		.bar {
			position: relative;
			width: 40px;
			height: 240px;
			background-color: #48bf7d;
		}
		.sign {
			position: absolute;
			left: 50%;
			width: 200px;
			height: 60px;
			background-color: #ecdfea;
			transform: translateX(-50%);
		}
		.sign.top {
			top: 20px;
			border-top-left-radius: 20px;
			border-bottom-left-radius: 20px;
			clip-path: polygon(0 0, 0 0, calc(100% - 40px) 0, 100% 30px, 100% calc(100% - 30px), calc(100% - 40px) 100%, 0 100%, 0 0);
		}
		.sign.bottom {
			top: 90px;
			border-top-right-radius: 20px;
			border-bottom-right-radius: 20px;
			clip-path: polygon(40px 0, 0 30px, 0 calc(100% - 30px), 40px 100%, 100% 100%, 100% 0);
		}
	</style>
</html>
