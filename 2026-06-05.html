<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="bar-out">
				<div class="bar-in">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</div>
			</div>
		</div>
	</body>
	<style>
		* {
			margin: 0;
		}
		.container {
			display: flex;
			width: 100%;
			height: 100vh;
			justify-content: center;
			align-items: center;
			background: #9c85e2;
		}
		.bar-out {
			display: flex;
			width: 300px;
			height: 70px;
			justify-content: center;
			align-items: center;
			border-radius: 20px;
			background-color: #332168;
		}
		.bar-in {
			position: relative;
			width: 280px;
			height: 50px;
			background-color: #fff;
			border-radius: 10px;
		}
		.bar-in span {
			position: absolute;
			width: 20px;
			aspect-ratio: 1 / 1;
			background-color: #332168;
			border-radius: 50%;
			top: 50%;
			transform: translateY(-50%);
		}
		.bar-in span:nth-child(1) {
			left: 15px;
		}
		.bar-in span:nth-child(2) {
			left: 45px;
		}
		.bar-in span:nth-child(3) {
			left: 75px;
		}
		.bar-in span:nth-child(4) {
			left: 105px;
		}
		.bar-in span:nth-child(5) {
			left: 135px;
		}
	</style>
</html>
