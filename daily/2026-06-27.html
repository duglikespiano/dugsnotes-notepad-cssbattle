<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="lines">
				<div class="line left"></div>
				<div class="line right"></div>
				<div class="side"></div>
			</div>
		</div>
	</body>
	<style>
		* {
			margin: 0;
		}
		.container {
			display: flex;
			width: 100%;
			height: 100vh;
			justify-content: center;
			align-items: center;
			background: #5dbcf9;
		}
		.lines {
			position: relative;
		}
		.line {
			position: absolute;
			width: 230px;
			height: 80px;
			left: 50%;
			top: 50%;
			border-radius: 40px;
			background-color: #e3e46f;
		}
		.left {
			transform: translate(-50%, -50%) rotate(45deg);
		}
		.right {
			transform: translate(-50%, -50%) rotate(135deg);
		}
		.side {
			position: absolute;
			width: 140px;
			height: 50px;
			left: 50%;
			top: 50%;
			background-color: #e3e46f;
			transform: translate(-50%, -50%);
		}
	</style>
</html>
