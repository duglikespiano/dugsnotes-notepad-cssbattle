<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div class="container">
			<div class="square"></div>
		</div>
	</body>
	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
		}
		.container {
			display: flex;
			width: 100%;
			height: 100vh;
			align-items: center;
			justify-content: center;
			background: #81be48;
		}
		.square {
			position: relative;
			width: 180px;
			height: 180px;
			background-color: #fff;
			border-radius: 30px;
		}
		.square:before {
			position: absolute;
			content: '';
			width: 80px;
			height: 80px;
			left: 50%;
			top: 50%;
			background-color: #81be48;
			transform: translate(-50%, -50%);
		}
		.square:after {
			position: absolute;
			content: '';
			width: 150%;
			height: 50px;
			left: 50%;
			top: 50%;
			background-color: #81be48;
			transform: translate(-50%, -50%) rotate(45deg);
			transform-origin: center center;
		}
	</style>
</html>
